services:
  seed-finder:
    image: seed-finder:latest
    container_name: nightreign-seed-finder
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    # 如需 Supabase/Redis，创建 .env.production 并取消下面注释：
    # env_file:
    #   - .env.production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s